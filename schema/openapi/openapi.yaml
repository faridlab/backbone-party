components:
  schemas:
    Party:
      type: object
      required:
        - id
        - company_id
        - party_code
        - party_kind
        - name
        - status
        - metadata
      properties:
        id:
          type: string
          format: uuid
        company_id:
          type: string
          format: uuid
        party_code:
          type: string
          maxLength: 30
        party_kind:
          type: string
        name:
          type: string
          maxLength: 200
        legal_name:
          nullable: true
          type: string
          maxLength: 200
        first_name:
          nullable: true
          type: string
          maxLength: 100
        last_name:
          nullable: true
          type: string
          maxLength: 100
        npwp:
          nullable: true
          type: string
          maxLength: 25
        nik:
          nullable: true
          type: string
          maxLength: 20
        status:
          type: string
        notes:
          nullable: true
          type: string
          maxLength: 1000
        metadata:
          type: object

    PartyBulkResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Party'
        total: { type: integer }
        failed: { type: integer }
        errors:
          type: array
          items: { type: string }

    CreatePartyRequest:
      type: object
      required:
        - company_id
        - party_code
        - party_kind
        - name
        - status
        - metadata
      properties:
        company_id:
          type: string
          format: uuid
        party_code:
          type: string
          maxLength: 30
        party_kind:
          type: string
        name:
          type: string
          maxLength: 200
        legal_name:
          nullable: true
          type: string
          maxLength: 200
        first_name:
          nullable: true
          type: string
          maxLength: 100
        last_name:
          nullable: true
          type: string
          maxLength: 100
        npwp:
          nullable: true
          type: string
          maxLength: 25
        nik:
          nullable: true
          type: string
          maxLength: 20
        status:
          type: string
        notes:
          nullable: true
          type: string
          maxLength: 1000
        metadata:
          type: object

    UpdatePartyRequest:
      type: object
      required:
        - company_id
        - party_code
        - party_kind
        - name
        - status
        - metadata
      properties:
        company_id:
          type: string
          format: uuid
        party_code:
          type: string
          maxLength: 30
        party_kind:
          type: string
        name:
          type: string
          maxLength: 200
        legal_name:
          nullable: true
          type: string
          maxLength: 200
        first_name:
          nullable: true
          type: string
          maxLength: 100
        last_name:
          nullable: true
          type: string
          maxLength: 100
        npwp:
          nullable: true
          type: string
          maxLength: 25
        nik:
          nullable: true
          type: string
          maxLength: 20
        status:
          type: string
        notes:
          nullable: true
          type: string
          maxLength: 1000
        metadata:
          type: object

